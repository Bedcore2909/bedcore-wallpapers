<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedcore's Minecraft Wallpapers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dirt: #8B6340;
      --grass: #5D9E3E;
      --stone: #7A7A7A;
      --sky: #87CEEB;
      --night: #0D1B2A;
      --green-dark: #2E5A1C;
      --pixel-border: 3px;
      --card-bg: #1a1a2e;
      --card-hover: #16213e;
      --accent: #5D9E3E;
      --accent2: #F59E0B;
      --text: #E8E8D8;
      --muted: #9A9A8A;
    }

    body {
      background-color: #0D1117;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(93,158,62,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 10%, rgba(13,107,184,0.08) 0%, transparent 50%);
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 4rem 1rem 3rem;
      overflow: hidden;
    }

    .pixel-strip {
      height: 16px;
      background: repeating-linear-gradient(
        90deg,
        #5D9E3E 0px, #5D9E3E 16px,
        #4A7D2F 16px, #4A7D2F 32px,
        #8B6340 32px, #8B6340 48px,
        #6B4A2A 48px, #6B4A2A 64px
      );
      image-rendering: pixelated;
    }

    .pixel-strip.bottom {
      background: repeating-linear-gradient(
        90deg,
        #6B4A2A 0px, #6B4A2A 16px,
        #555555 16px, #555555 32px,
        #444444 32px, #444444 48px,
        #6B4A2A 48px, #6B4A2A 64px
      );
    }

    header h1 {
      font-family: 'VT323', monospace;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 4px;
      color: #fff;
      text-shadow:
        4px 4px 0 #2E5A1C,
        8px 8px 0 #1a3010,
        0 0 40px rgba(93,158,62,0.4);
      margin-bottom: 0.5rem;
    }

    header h1 span { color: var(--accent2); }

    header p {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 2rem 1rem 1rem;
    }

    .filter-btn {
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      letter-spacing: 1px;
      padding: 6px 18px;
      border: 2px solid #333;
      background: #111;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      image-rendering: pixelated;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 12px rgba(93,158,62,0.4);
    }

    /* ── GALLERY GRID ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 2rem clamp(1rem, 4vw, 4rem) 4rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border: 2px solid #222;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }

    .card:hover .card-overlay { opacity: 1; }

    .card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #111;
      overflow: hidden;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s;
    }

    .card:hover .card-img-wrap img { transform: scale(1.05); }

    /* placeholder if no image */
    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      background: linear-gradient(135deg, #111 0%, #1a2a1a 100%);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .overlay-btn {
      font-family: 'VT323', monospace;
      font-size: 1rem;
      padding: 8px 16px;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }

    .overlay-btn:hover { background: rgba(255,255,255,0.15); }
    .overlay-btn.dl { border-color: var(--accent2); color: var(--accent2); }
    .overlay-btn.dl:hover { background: rgba(245,158,11,0.15); }

    .delete-btn {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      font-family: 'VT323', monospace;
      font-size: 1rem;
      padding: 4px 10px;
      border: 2px solid #c0392b;
      background: rgba(0,0,0,0.75);
      color: #e74c3c;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }

    .delete-btn:hover { background: rgba(192,57,43,0.5); color: #fff; }
    body.admin-mode .delete-btn { display: block; }

    .card-body { padding: 12px 14px 14px; }

    .card-tag {
      display: inline-block;
      font-family: 'VT323', monospace;
      font-size: 0.85rem;
      letter-spacing: 1px;
      padding: 2px 8px;
      background: rgba(93,158,62,0.15);
      border: 1px solid rgba(93,158,62,0.3);
      color: var(--accent);
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 2rem;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 90vw;
      max-height: 78vh;
      border: 3px solid #333;
      display: block;
    }

    .lb-info {
      text-align: center;
      font-family: 'VT323', monospace;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--text);
    }

    .lb-nav {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .lb-btn {
      font-family: 'VT323', monospace;
      font-size: 1.2rem;
      padding: 8px 20px;
      border: 2px solid #555;
      background: #111;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
      transition: border-color 0.15s;
    }

    .lb-btn:hover { border-color: var(--accent); }
    .lb-close { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 1.5rem; border-color: #800; }
    .lb-close:hover { border-color: #f00; }

    /* ── UPLOAD ZONE ── */
    .upload-section {
      max-width: 600px;
      margin: 0 auto 2rem;
      padding: 0 1rem;
      text-align: center;
    }

    .upload-label {
      display: block;
      border: 2px dashed #333;
      padding: 2rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-family: 'VT323', monospace;
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: var(--muted);
    }

    .upload-label:hover {
      border-color: var(--accent);
      background: rgba(93,158,62,0.05);
      color: var(--text);
    }

    .upload-label span { display: block; font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 300; margin-top: 6px; color: var(--muted); letter-spacing: 0; }

    #file-input { display: none; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: #444;
      font-family: 'VT323', monospace;
      letter-spacing: 2px;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .empty-state p { font-family: 'Outfit', sans-serif; font-size: 0.9rem; margin-top: 0.5rem; letter-spacing: 0; font-weight: 300; }

    .search-wrap {
      max-width: 500px;
      margin: 1.5rem auto 0;
      padding: 0 1rem;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: #111;
      border: 2px solid #333;
      color: var(--text);
      font-family: 'VT323', monospace;
      font-size: 1.2rem;
      letter-spacing: 1px;
      padding: 10px 44px 10px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent); }

    .search-clear {
      position: absolute;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      display: none;
      line-height: 1;
    }

    .search-clear:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="pixel-strip"></div>

  <header>
    <h1>Bedcore's <span>Minecraft</span> Wallpapers</h1>
    <p>A personal collection of screenshots &amp; scenes</p>
  </header>

  <div class="pixel-strip bottom"></div>

  <!-- Upload zone (hidden by default, revealed with Ctrl+Shift+I) -->
  <div class="upload-section" id="upload-section" style="margin-top: 2.5rem; display: none;">
    <label class="upload-label" for="file-input">
      &#x2295; Add Wallpapers
      <span>Click to select images from your computer (PNG, JPG, WEBP)</span>
    </label>
    <input type="file" id="file-input" multiple accept="image/*" />
  </div>

  <!-- Search bar -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="&#x2315; Search wallpapers..." autocomplete="off" />
    <button class="search-clear" id="search-clear">&#x2715;</button>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-btn active" data-tag="all">All</button>
    <button class="filter-btn" data-tag="day">Day</button>
    <button class="filter-btn" data-tag="night">Night</button>
    <button class="filter-btn" data-tag="sunrise">Sunrise</button>
    <button class="filter-btn" data-tag="cave">Cave</button>
    <button class="filter-btn" data-tag="ocean">Ocean</button>
    <button class="filter-btn" data-tag="mountains">Mountains</button>
    <button class="filter-btn" data-tag="build">Builds</button>
    <button class="filter-btn" data-tag="nether">Nether</button>
    <button class="filter-btn" data-tag="end">The End</button>
  </div>

  <!-- Gallery grid -->
  <div class="gallery" id="gallery">
    <div class="empty-state">
      No wallpapers yet!
      <p>Use the upload zone above to add your first Minecraft screenshot.</p>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox">
    <button class="lb-btn lb-close" id="lb-close">✕ close</button>
    <img id="lb-img" src="" alt="" />
    <div class="lb-info" id="lb-title"></div>
    <div class="lb-nav">
      <button class="lb-btn" id="lb-prev">← prev</button>
      <button class="lb-btn" id="lb-next">next →</button>
    </div>
  </div>

  <footer>Built with blocks &amp; love &mdash; My Minecraft Gallery</footer>

  <script>
    const gallery = document.getElementById('gallery');
    const fileInput = document.getElementById('file-input');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbTitle = document.getElementById('lb-title');
    const lbClose = document.getElementById('lb-close');
    const lbPrev = document.getElementById('lb-prev');
    const lbNext = document.getElementById('lb-next');

    let wallpapers = JSON.parse(localStorage.getItem('mc-wallpapers') || '[]');

const builtInWallpapers = [
  { src: "./images/", name: "Buried ender chest", tags: ["Ocean"], size: "3.1 MB", date: "13 May 2026" },
  { src: "./images/", name: "Taiga village", tags: ["Day"], size: "3.1 MB", date: "13 May 2026" },
  // add more here...
];

wallpapers = [...builtInWallpapers, ...wallpapers];
    let currentIndex = 0;
    let activeTag = 'all';
    let searchQuery = '';

    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');

    const TAGS = ['day','night','sunrise','cave','ocean','mountains','build','nether','end'];

    function guessTags(name) {
      const n = name.toLowerCase();
      const found = TAGS.filter(t => n.includes(t));
      return found.length ? found : ['uncategorized'];
    }

    function renderGallery() {
      let visible = activeTag === 'all'
        ? wallpapers
        : wallpapers.filter(w => w.tags.includes(activeTag));

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        visible = visible.filter(w =>
          w.name.toLowerCase().includes(q) ||
          w.tags.some(t => t.toLowerCase().includes(q))
        );
      }

      if (visible.length === 0) {
        const msg = searchQuery
          ? `No results for "${searchQuery}"`
          : 'No wallpapers yet!';
        const sub = searchQuery
          ? 'Try a different search term or clear the search.'
          : 'Use the upload zone above to add your first Minecraft screenshot.';
        gallery.innerHTML = `<div class="empty-state">${msg}<p>${sub}</p></div>`;
        return;
      }

      gallery.innerHTML = visible.map((w, i) => {
        const realIndex = wallpapers.indexOf(w);
        return `
          <div class="card" data-index="${realIndex}">
            <button class="delete-btn" onclick="deleteWallpaper(${realIndex})">✕ Delete</button>
            <div class="card-img-wrap">
              <img src="${w.src}" alt="${w.name}" loading="lazy" />
              <div class="card-overlay">
                <button class="overlay-btn" onclick="openLightbox(${realIndex})">&#x2610; View</button>
                <button class="overlay-btn dl" onclick="downloadWallpaper(${realIndex})">&#x21E9; Save</button>
              </div>
            </div>
            <div class="card-body">
              ${w.tags.map(t => `<span class="card-tag">${t}</span> `).join('')}
              <div class="card-title">${w.name}</div>
              <div class="card-meta">${w.size} &bull; ${w.date}</div>
            </div>
          </div>`;
      }).join('');
    }

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add('open');
    }

    function updateLightbox() {
      const w = wallpapers[currentIndex];
      lbImg.src = w.src;
      lbImg.alt = w.name;
      lbTitle.textContent = w.name + ' — ' + w.tags.join(', ');
    }

    function closeLightbox() { lightbox.classList.remove('open'); }

    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    lbPrev.addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + wallpapers.length) % wallpapers.length;
      updateLightbox();
    });

    lbNext.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % wallpapers.length;
      updateLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowLeft') lbPrev.click();
      if (e.key === 'ArrowRight') lbNext.click();
      if (e.key === 'Escape') closeLightbox();
    });

    function deleteWallpaper(index) {
      if (!confirm(`Delete "${wallpapers[index].name}"?`)) return;
      wallpapers.splice(index, 1);
      try { localStorage.setItem('mc-wallpapers', JSON.stringify(wallpapers)); } catch(e) {}
      renderGallery();
    }

    function downloadWallpaper(index) {
      const w = wallpapers[index];
      const a = document.createElement('a');
      a.href = w.src;
      a.download = w.name;
      a.click();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    fileInput.addEventListener('change', () => {
      const files = Array.from(fileInput.files);
      let loaded = 0;

      files.forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => {
          const name = file.name.replace(/\.[^.]+$/, '');
          wallpapers.unshift({
            src: e.target.result,
            name: name,
            tags: guessTags(name),
            size: formatSize(file.size),
            date: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
          });
          loaded++;
          if (loaded === files.length) {
            try { localStorage.setItem('mc-wallpapers', JSON.stringify(wallpapers)); } catch(e) {}
            renderGallery();
          }
        };
        reader.readAsDataURL(file);
      });

      fileInput.value = '';
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTag = btn.dataset.tag;
        renderGallery();
      });
    });

    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value.trim();
      searchClear.style.display = searchQuery ? 'block' : 'none';
      renderGallery();
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.style.display = 'none';
      searchInput.focus();
      renderGallery();
    });

    // Secret key combo: Ctrl + Shift + I toggles admin mode (upload + delete buttons)
    const uploadSection = document.getElementById('upload-section');
    let adminMode = false;
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.shiftKey && e.key === 'I') {
        e.preventDefault();
        adminMode = !adminMode;
        uploadSection.style.display = adminMode ? 'block' : 'none';
        document.body.classList.toggle('admin-mode', adminMode);
      }
    });

    renderGallery();
  </script>
</body>
</html>
